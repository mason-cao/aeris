services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: aeris
      POSTGRES_PASSWORD: aeris
      POSTGRES_DB: aeris
    ports:
      - "5432:5432"
    volumes:
      - aeris_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeris"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aeris_pgdata:
